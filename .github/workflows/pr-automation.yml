name: PR Automation Workflow
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
        id: eslint
      - name: Run Prettier checks
        run: npx prettier --check .
        id: prettier
      - name: Post Code Quality Report
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const commentBody = `
            ## Code Quality Report
            ### ESLint Checks:
            ${{ steps.eslint.outcome === 'success' ? '✅ Passed' : '❌ Failed' }}
            ### Prettier Checks:
            ${{ steps.prettier.outcome === 'success' ? '✅ Passed' : '❌ Failed' }}
            `;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run test suite with coverage
        run: npm test -- --coverage
        id: test
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const commentBody = `
            ## Test Coverage Report
            ### Test Suite:
            ${{ steps.test.outcome === 'success' ? '✅ Passed' : '❌ Failed' }}
            ### Coverage Summary:
            (Coverage details will be available in the uploaded artifact)
            `;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run dependency vulnerability check
        run: npm audit --json > audit.json || true
        id: audit
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
        id: secrets
      - name: Post Security Scan Report
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const auditResult = ${{ steps.audit.outcome === 'success' ? '✅ No vulnerabilities found' : '❌ Vulnerabilities detected' }};
            const secretsResult = ${{ steps.secrets.outcome === 'success' ? '✅ No secrets found' : '❌ Secrets detected' }};
            const commentBody = `
            ## Security Scan Report
            ### Dependencies:
            ${auditResult}
            ### Secrets Scan:
            ${secretsResult}
            `;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build
        id: build
      - name: Validate endpoints (example)
        run: |
          # Start the server in background
          npm start &
          # Wait for server to start
          sleep 5
          # Check endpoints
          curl -I http://localhost:3000 || true
        id: endpoints
      - name: Upload deployment preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/
      - name: Post Build Validation
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const buildResult = ${{ steps.build.outcome === 'success' ? '✅ Build succeeded' : '❌ Build failed' }};
            const endpointsResult = ${{ steps.endpoints.outcome === 'success' ? '✅ Endpoints accessible' : '❌ Endpoints validation failed' }};
            const commentBody = `
            ## Build Validation
            ### Build Status:
            ${buildResult}
            ### Endpoints Validation:
            ${endpointsResult}
            `;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });